services:
  mail-server:
    image: stalwart/stalwart-mail:latest
    container_name: stalwart-mail
    restart: always
    ports:
      - "25:25"     # SMTP (Receiving from other servers)
      - "587:587"   # Submission (Invoice Ninja will use this)
      - "465:465"   # SMTPS
      - "993:993"   # IMAP (For you to check your mail)
      - "55008:8080" # Stalwart Web Admin UI
    volumes:
      - /home/taufiq/docker/stalwart:/opt/stalwart-mail
    environment:
      - STALWART_URL=https://mail.tsconsulting.services
services:
  mail-server:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart-mail
    restart: always
    tty: true
    stdin_open: true
    ports:
      - "25:25"        # SMTP (Receiving)
      - "587:587"      # Submission (Invoice Ninja Sending)
      - "465:465"      # SMTPS
      - "143:143"      # IMAP
      - "993:993"      # IMAPS
      - "443:443"      # HTTPS (Web Interface)
      - "55008:8080"   # HTTP Admin UI
    volumes:
      - /home/taufiq/docker/stalwart:/opt/stalwart
    environment:
      - STALWART_URL=https://mail.tsconsulting.services
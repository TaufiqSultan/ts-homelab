services:
  db:
    image: mariadb:10.11
    container_name: ninja-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - /home/taufiq/docker/invoiceninja/db:/var/lib/mysql

  app:
    image: invoiceninja/invoiceninja:5
    container_name: ninja-app
    restart: always
    environment:
     - APP_URL=${APP_URL}
     - APP_KEY=${APP_KEY}
     - DB_TYPE=${DB_TYPE}
     - DB_STRICT=${DB_STRICT}
     - DB_HOST=${DB_HOST}
     - DB_DATABASE=${DB_DATABASE}
     - DB_USERNAME=${DB_USERNAME}
     - DB_PASSWORD=${DB_PASSWORD}
     - IN_USER_EMAIL=${IN_USER_EMAIL}
     - IN_PASSWORD=${IN_PASSWORD}
     - TRUSTED_PROXIES=${TRUSTED_PROXIES}
     - REQUIRE_HTTPS=${REQUIRE_HTTPS}
    volumes:
      - /home/taufiq/docker/invoiceninja/app/public:/var/www/app/public
      - /home/taufiq/docker/invoiceninja/app/storage:/var/www/app/storage
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: ninja-web
    restart: always
    ports:
      - "8001:80"
    volumes:
      - /home/taufiq/docker/invoiceninja/app/public:/var/www/app/public:ro
      - /home/taufiq/docker/invoiceninja/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: ninja-db
    restart: always
    env_file:
     - /home/taufiq/docker/invoiceninja/app/.env
    volumes:
      - /home/taufiq/docker/invoiceninja/db:/var/lib/mysql

  app:
    image: invoiceninja/invoiceninja:5
    container_name: ninja-app
    restart: always
    env_file:
     - /home/taufiq/docker/invoiceninja/app/.env
    volumes:
      - /home/taufiq/docker/invoiceninja/app/public:/var/www/app/public
      - /home/taufiq/docker/invoiceninja/app/storage:/var/www/app/storage
      - /home/taufiq/docker/invoiceninja/app/.env:/var/www/app/.env
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: ninja-web
    restart: always
    ports:
      - "8001:80"
    volumes:
      - /home/taufiq/docker/invoiceninja/app/public:/var/www/app/public:ro
      - /home/taufiq/docker/invoiceninja/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
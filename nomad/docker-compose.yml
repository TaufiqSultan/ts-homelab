services:
  app:
    image: mauriceboe/nomad:2.5.5
    container_name: nomad
    ports:
      - "${NOMAD_PORT}:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${NOMAD_JWT_SECRET}
      - PORT=${NOMAD_PORT}
    volumes:
      - ${NOMAD_DATA_DIR}:/app/data
      - ${NOMAD_UPLOAD_DIR}:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s